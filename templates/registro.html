<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ForoHub - Registro</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header>
    <h1>📋 ForoHub</h1>
    <nav>
        <a th:href="@{/}">Inicio</a>
        <a th:href="@{/login}">Iniciar Sesión</a>
    </nav>
</header>

<main>
    <div class="form-container">
        <h2>Crear Cuenta</h2>
        <div id="mensaje" class="info-msg" style="display:none;"></div>
        <div class="form-group">
            <label>Nombre:</label>
            <input type="text" id="nombre" placeholder="Tu nombre"/>
        </div>
        <div class="form-group">
            <label>Email:</label>
            <input type="email" id="email" placeholder="tu@email.com"/>
        </div>
        <div class="form-group">
            <label>Contraseña:</label>
            <input type="password" id="contrasena" placeholder="••••••••"/>
        </div>
        <button onclick="registrarUsuario()" class="btn-primary">Registrarse</button>
    </div>
</main>

<footer>
    <p>ForoHub - Challenge Alura Latam Oracle ONE</p>
</footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
