<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ForoHub - Tópicos</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header>
    <h1>📋 ForoHub</h1>
    <nav>
        <a th:href="@{/}">Inicio</a>
        <a th:href="@{/login}" id="btn-login">Iniciar Sesión</a>
        <a th:href="@{/registro}">Registrarse</a>
        <button onclick="cerrarSesion()" id="btn-logout" style="display:none;">Cerrar Sesión</button>
    </nav>
</header>

<main>
    <div class="topicos-header">
        <h2>Tópicos del Foro</h2>
        <button onclick="mostrarFormulario()" id="btn-nuevo" class="btn-primary" style="display:none;">
            + Nuevo Tópico
        </button>
    </div>

    <div id="form-nuevo-topico" class="form-container" style="display:none;">
        <h3>Crear Nuevo Tópico</h3>
        <div class="form-group">
            <label>Título:</label>
            <input type="text" id="titulo" placeholder="Título del tópico"/>
        </div>
        <div class="form-group">
            <label>Mensaje:</label>
            <textarea id="mensaje" placeholder="Describe tu duda o pregunta" rows="4"></textarea>
        </div>
        <div class="form-group">
            <label>Curso:</label>
            <input type="text" id="curso" placeholder="Nombre del curso"/>
        </div>
        <button onclick="crearTopico()" class="btn-primary">Publicar</button>
        <button onclick="ocultarFormulario()" class="btn-secondary">Cancelar</button>
    </div>

    <div id="lista-topicos" class="topicos-grid"></div>
</main>

<footer>
    <p>ForoHub - Challenge Alura Latam Oracle ONE</p>
</footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
